[project]
name = "flet_app"
version = "0.1.0"
description = "Generic Flet application"
requires-python = ">=3.10"

# Dependencia mínima para builds rápidos
dependencies = [
    "flet>=0.26.0"
]

# Dependencias opcionales
[project.optional-dependencies]

dev = [
    "black",
    "ruff",
    "pytest",
    "rich"
]

api = [
    "requests",
    "httpx",
    "pydantic",
    "python-dotenv"
]

database = [
    "aiosqlite"
]

utils = [
    "loguru",
    "orjson"
]

mobile = [
    "requests",
    "aiosqlite"
]

# Configuración de Flet
[tool.flet]
org = "com.example"
product = "FletApp"
company = "Example"
build_number = 1

# IMPORTANTE: main.py está en la raíz
[tool.flet.app]
path = "."

# Icono de la app
[tool.flet.android]
icon = "assets/icon.png"

# Splash screen opcional
[tool.flet.splash]
image = "assets/splash.png"
background_color = "#ffffff"

# Plugins Flutter opcionales
[tool.flet.flutter]
dependencies = []
